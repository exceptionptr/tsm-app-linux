name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── 0. Tests (gate: all build jobs require this to pass) ──────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # hatch-vcs needs full tag history

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check tsm/ tests/

      - name: Type check with mypy
        run: mypy tsm/

      - name: Run unit tests
        run: pytest tests/unit/ -v

      - name: Run integration tests
        run: pytest tests/integration/ -v

  # ── 1. Build Python wheel ─────────────────────────────────────────────────
  build-wheel:
    name: Build wheel
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # hatch-vcs needs full tag history

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Extract version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build wheel
        run: |
          pip install build hatch-vcs
          python -m build --wheel

      - uses: actions/upload-artifact@v7
        with:
          name: wheel
          path: dist/*.whl

  # ── 2. Build .deb ─────────────────────────────────────────────────────────
  build-deb:
    name: Build .deb
    needs: build-wheel
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.build-wheel.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v8
        with:
          name: wheel
          path: dist/

      - name: Install wheel into staging tree
        run: |
          pip install installer
          python -m installer --destdir=staging dist/*.whl

      - name: Add desktop entry and license
        run: |
          install -Dm644 packaging/tsm-app.desktop \
            staging/usr/share/applications/tsm-app.desktop
          install -Dm644 LICENSE \
            staging/usr/share/doc/tsm-app/copyright

      - name: Write DEBIAN/control
        run: |
          mkdir -p staging/DEBIAN
          # Deps are canonical in packaging/debian/ci-depends (no dpkg substitution vars).
          DEPENDS=$(cat packaging/debian/ci-depends)
          cat > staging/DEBIAN/control << EOF
          Package: tsm-app
          Version: ${VERSION}
          Architecture: all
          Maintainer: exceptionptr <https://github.com/exceptionptr>
          Depends: ${DEPENDS}
          Homepage: https://github.com/exceptionptr/tsm-app-linux
          Description: TradeSkillMaster Desktop App for Linux
           Downloads auction house data from the TSM API and writes Lua files for
           the TradeSkillMaster WoW addon running under Wine, Lutris, or Steam.
          EOF

      - name: Build .deb
        run: |
          dpkg-deb --root-owner-group --build staging \
            "dist/tsm-app_${VERSION}_all.deb"

      - uses: actions/upload-artifact@v7
        with:
          name: deb
          path: dist/*.deb

  # ── 3. Build .rpm ─────────────────────────────────────────────────────────
  build-rpm:
    name: Build .rpm
    needs: build-wheel
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.build-wheel.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v8
        with:
          name: wheel
          path: dist/

      - name: Install fpm
        run: |
          sudo apt-get install -y ruby ruby-dev rpm
          sudo gem install fpm --no-document

      - name: Install wheel into staging tree
        run: |
          pip install installer
          python -m installer --destdir=staging dist/*.whl
          install -Dm644 packaging/tsm-app.desktop \
            staging/usr/share/applications/tsm-app.desktop
          install -Dm644 LICENSE \
            staging/usr/share/licenses/tsm-app/LICENSE

      - name: Build .rpm with fpm
        run: |
          # Build --depends flags from the canonical ci-depends file
          FPM_DEPS=$(tr ',' '\n' < packaging/debian/ci-depends \
            | sed 's/^ *//;s/ *$//' \
            | sed 's/ (>= />=/' | sed 's/)//' \
            | awk '{print "--depends "$0}' \
            | tr '\n' ' ')
          fpm -s dir -t rpm \
            --name tsm-app \
            --version "${VERSION}" \
            --architecture noarch \
            --maintainer "exceptionptr" \
            --url "https://github.com/exceptionptr/tsm-app-linux" \
            --description "TradeSkillMaster Desktop App for Linux" \
            --license MIT \
            ${FPM_DEPS} \
            --package "dist/tsm-app-${VERSION}-1.noarch.rpm" \
            -C staging .

      - uses: actions/upload-artifact@v7
        with:
          name: rpm
          path: dist/*.rpm

  # ── 4. Create GitHub Release ──────────────────────────────────────────────
  github-release:
    name: GitHub Release
    needs: [build-wheel, build-deb, build-rpm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - uses: softprops/action-gh-release@v2.6.1
        with:
          name: "TSM App ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            artifacts/wheel/*.whl
            artifacts/deb/*.deb
            artifacts/rpm/*.rpm
