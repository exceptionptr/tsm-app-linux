name: Publish to AUR

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.0.3)"
        required: true

jobs:
  publish-aur:
    name: Publish to AUR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Update PKGBUILD version
        run: |
          sed -i "s/^pkgver=.*/pkgver=${{ github.event.inputs.version }}/" packaging/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" packaging/PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: tsm-app
          pkgbuild: packaging/PKGBUILD
          commit_username: exceptionptr
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          commit_message: "Update to v${{ github.event.inputs.version }}"
          updpkgsums: true
          allow_empty_commits: false
